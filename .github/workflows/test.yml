name: Test Build

on:
  push:
    branches-ignore:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_MAJOR_VERSION: 4

jobs:
  book-source-test:
    name: Book Source Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run book source sample tests
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            chmod +x gradlew
            ./gradlew :app:connectedAppDebugAndroidTest "-Pandroid.testInstrumentationRunnerArguments.class=io.wanjuan.app.BookSourceSampleInstrumentedTest" --no-daemon --stacktrace --warning-mode all

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      product: app
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: set-version
        shell: bash
        run: |
          VERSION="$(date -d "8 hour" -u +${APP_MAJOR_VERSION}.%y.%m%d%H%M)"
          VERSION_CODE="$(($(date -u +%s) / 60))"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION}"
          echo "VERSION_CODE=${VERSION_CODE}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: Build web assets
        working-directory: modules/web
        run: |
          pnpm i
          pnpm build

      - name: Clear 18PlusList.txt
        run: |
          echo "" > "$GITHUB_WORKSPACE/app/src/main/assets/18PlusList.txt"

      - name: Configure release signing key
        run: |
          missing=()
          for name in RELEASE_KEY_STORE RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD RELEASE_STORE_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            {
              echo "RELEASE_KEY_ALIAS=${RELEASE_KEY_ALIAS}"
              echo "RELEASE_KEY_PASSWORD=${RELEASE_KEY_PASSWORD}"
              echo "RELEASE_STORE_PASSWORD=${RELEASE_STORE_PASSWORD}"
              echo "RELEASE_STORE_FILE=./key.jks"
            } >> "$GITHUB_WORKSPACE/gradle.properties"
            echo "$RELEASE_KEY_STORE" | base64 --decode > "$GITHUB_WORKSPACE/app/key.jks"
          elif [ -f "$GITHUB_WORKSPACE/app/ci-release.keystore" ]; then
            echo "::warning::Release signing secrets are not configured; using stable repository CI release signing key."
            {
              echo "RELEASE_STORE_FILE=./ci-release.keystore"
              echo "RELEASE_KEY_ALIAS=wanjuan-ci-release"
              echo "RELEASE_STORE_PASSWORD=wanjuan-ci-release"
              echo "RELEASE_KEY_PASSWORD=wanjuan-ci-release"
            } >> "$GITHUB_WORKSPACE/gradle.properties"
          else
            printf "::error::Missing release signing secret: %s\n" "${missing[@]}"
            exit 1
          fi
        env:
          RELEASE_KEY_STORE: ${{ secrets.RELEASE_KEY_STORE }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew -PVERSION_NAME="${VERSION}" -PVERSION_CODE="${VERSION_CODE}" assembleAppRelease --build-cache --parallel --daemon --warning-mode all

      - name: Organize build outputs
        run: |
          shopt -s nullglob
          mkdir -p "${{ github.workspace }}/apk"
          mkdir -p "${{ github.workspace }}/mapping"
          for file in "${{ github.workspace }}"/app/build/outputs/apk/*/*/*.apk; do
            cp "$file" "${{ github.workspace }}/apk/wanjuan_${{ env.product }}_${VERSION}.apk"
          done
          for file in "${{ github.workspace }}"/app/build/outputs/mapping/*/mapping.txt; do
            cp "$file" "${{ github.workspace }}/mapping/mapping.txt"
          done
          for file in "${{ github.workspace }}"/app/build/outputs/mapping/*/missing_rules.txt; do
            cp "$file" "${{ github.workspace }}/mapping/missing_rules.txt"
          done

      - name: Check build outputs
        run: |
          test -d "${{ github.workspace }}/apk"
          test -n "$(find "${{ github.workspace }}/apk" -maxdepth 1 -name 'wanjuan_*.apk' -print -quit)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: wanjuan.app
          if-no-files-found: error
          path: ${{ github.workspace }}/apk/*.apk

      - name: Upload mapping artifact
        uses: actions/upload-artifact@v7
        with:
          name: wanjuan.app.mapping
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/mapping.txt

      - name: Upload missing rules artifact
        uses: actions/upload-artifact@v7
        with:
          name: wanjuan.app.mapping.missing_rules
          if-no-files-found: ignore
          path: ${{ github.workspace }}/mapping/missing_rules.txt
